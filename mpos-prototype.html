<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .device {
    width: 360px;
    height: 640px;
    position: relative;
    overflow: hidden;
    border-radius: 24px;
    box-shadow: 0 0 80px rgba(0,0,0,0.6);
    background: #fff;
  }
  .screen {
    position: absolute;
    top: 0; left: 0;
    width: 360px;
    height: 640px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    z-index: 1;
  }
  .screen.active {
    opacity: 1;
    pointer-events: auto;
    z-index: 10;
  }
  .screen img {
    width: 360px;
    height: 640px;
    display: block;
    object-fit: cover;
    object-position: top;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
  }
  /* For taller screens like more_methods, emi_plan, emi_card_expanded */
  .screen.scrollable {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .screen.scrollable img {
    height: auto;
    min-height: 640px;
  }
  /* Hotspot: transparent clickable area */
  .hotspot {
    position: absolute;
    cursor: pointer;
    /* background: rgba(255,0,0,0.15); /* uncomment to debug */
    z-index: 20;
    -webkit-tap-highlight-color: transparent;
  }
  .hotspot:active {
    background: rgba(0,0,0,0.05);
    border-radius: 12px;
  }
  /* Overlay for bottom sheets */
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 360px; height: 640px;
    background: rgba(0,0,0,0.45);
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .overlay img {
    position: absolute;
    bottom: 0; left: 0;
    width: 360px;
    height: 640px;
    object-fit: cover;
    object-position: bottom;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    transform: translateY(40%);
    transition: transform 0.35s ease;
  }
  .overlay.show img {
    transform: translateY(0);
  }
</style>
</head>

<script>
// ====== Navigation State ======
let history = [];
let currentScreen = 'splash1';
let timeouts = [];

function clearAllTimeouts() {
  timeouts.forEach(t => clearTimeout(t));
  timeouts = [];
}

// ====== Core Navigation ======
function go(screenId) {
  if (currentScreen === screenId) return;
  history.push(currentScreen);
  showScreen(screenId);
}

function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(screenId);
  if (target) {
    target.classList.add('active');
    currentScreen = screenId;
  }
}

function goBack() {
  clearAllTimeouts();
  if (history.length > 0) {
    const prev = history.pop();
    showScreen(prev);
  } else {
    showScreen('menu');
  }
}

function goHome() {
  clearAllTimeouts();
  history = [];
  showScreen('menu');
  currentScreen = 'menu';
}

// ====== Splash Sequence ======
function playSplash() {
  timeouts.push(setTimeout(() => showScreen('splash2'), 400));
  timeouts.push(setTimeout(() => showScreen('splash3'), 800));
  timeouts.push(setTimeout(() => showScreen('splash4'), 1400));
  timeouts.push(setTimeout(() => showScreen('splash5'), 2000));
  timeouts.push(setTimeout(() => {
    history = [];
    showScreen('menu');
    currentScreen = 'menu';
  }, 3500));
}
playSplash();

// ====== Amount Entry (simple: tap any key to switch to filled) ======
let amountEntered = false;
function pressKey(key) {
  if (key === 'back') {
    amountEntered = false;
    // stay on empty
  } else {
    amountEntered = true;
    history.push('home_empty');
    showScreen('home_filled');
  }
}

// ====== UPI Flow ======
function startUPI() {
  history.push(currentScreen);
  showScreen('qr_loading');
  // Auto advance to qr_ready after 2s
  timeouts.push(setTimeout(() => {
    if (currentScreen === 'qr_loading') {
      showScreen('qr_ready');
    }
  }, 2000));
}

// ====== Card Flow ======
function startCard() {
  history.push(currentScreen);
  showScreen('card_tap');
}

function confirmCardPin() {
  showScreen('card_pin_loading');
  timeouts.push(setTimeout(() => showScreen('card_processing'), 1500));
  timeouts.push(setTimeout(() => triggerSuccess('card'), 4000));
}

// ====== Payment Success ======
function triggerSuccess(flow) {
  clearAllTimeouts();
  let splashId, detailsId;
  if (flow === 'upi') {
    splashId = 'upi_success_splash';
    detailsId = 'upi_success_details';
  } else if (flow === 'card') {
    splashId = 'card_success_splash';
    detailsId = 'card_success_details';
  } else if (flow === 'paylink') {
    splashId = 'paylink_success_splash';
    detailsId = 'paylink_success';
  } else if (flow === 'emi') {
    splashId = 'emi_success_splash';
    detailsId = 'emi_success';
  }
  history = ['menu'];
  showScreen(splashId);
  timeouts.push(setTimeout(() => {
    showScreen(detailsId);
  }, 2500));
}

// ====== Paylink Flow ======
function startPaylink() {
  showScreen('paylink2');
  timeouts.push(setTimeout(() => {
    if (currentScreen === 'paylink2') showScreen('paylink3');
  }, 1800));
  timeouts.push(setTimeout(() => {
    if (currentScreen === 'paylink3') showScreen('paylink4');
  }, 3500));
}

function paylinkPaymentDone() {
  showScreen('paylink5');
  timeouts.push(setTimeout(() => triggerSuccess('paylink'), 2000));
}

// ====== EMI Flow ======
function confirmEmiPin() {
  showScreen('emi_pin_loader');
  timeouts.push(setTimeout(() => showScreen('emi_card_loader'), 1500));
  timeouts.push(setTimeout(() => triggerSuccess('emi'), 4000));
}

// ====== Overlays ======
function showOverlay(id) {
  document.getElementById(id).classList.add('show');
}

function hideOverlay(id) {
  document.getElementById(id).classList.remove('show');
}
</script>
</body>
